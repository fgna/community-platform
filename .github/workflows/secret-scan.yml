name: Secret Scan

on:
  push:
    branches: [main, develop, "feature/**", "fix/**", "claude/**"]
  pull_request:
    branches: [main, develop]

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install gitleaks
        run: go install github.com/zricethezav/gitleaks/v8@v8.30.1

      - name: Run gitleaks
        run: gitleaks detect --source . --redact --verbose
