name: CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**", "claude/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  # ─── Dependency Audit ───────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high --prod

  # ─── Typecheck ──────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm prisma generate

      - name: Typecheck
        run: pnpm typecheck

  # ─── Unit Tests (API) ───────────────────────────────────────────────────────
  test-api:
    name: API Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: community_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d community_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/community_test
      JWT_SECRET: ci-test-jwt-secret-at-least-32-chars-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm prisma generate

      - name: Run migrations
        working-directory: apps/api
        run: pnpm prisma migrate deploy

      - name: Run API unit tests
        working-directory: apps/api
        run: pnpm test:coverage

      - name: Run API integration tests
        working-directory: apps/api
        run: pnpm test:integration

      - name: Upload API coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: api-coverage
          path: apps/api/coverage/

  # ─── Unit Tests (Web) ───────────────────────────────────────────────────────
  test-web:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web unit tests
        working-directory: apps/web
        run: pnpm test:coverage

      - name: Upload web coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: web-coverage
          path: apps/web/coverage/

  # ─── Build APK ─────────────────────────────────────────────────────────────
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        working-directory: apps/mobile-android
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: community-apk
          path: apps/mobile-android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

  # ─── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build-apk]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: community-apk
          path: apps/web/public/app

      - name: Rename APK
        run: mv apps/web/public/app/app-release.apk apps/web/public/app/community.apk

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm prisma generate

      - name: Build all workspaces
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  # ─── Docker Build Check ─────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-apk]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: community-apk
          path: apps/web/public/app

      - name: Rename APK
        run: mv apps/web/public/app/app-release.apk apps/web/public/app/community.apk

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: community-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: community-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001

  # ─── Docker Smoke Test ───────────────────────────────────────────────────────
  docker-smoke:
    name: Docker Smoke Test
    runs-on: ubuntu-latest
    needs: [docker-build]
    env:
      JWT_SECRET: ci-smoke-jwt-secret-at-least-32-chars
      JWT_REFRESH_SECRET: ci-smoke-refresh-secret-at-least-32-chars
    steps:
      - uses: actions/checkout@v4

      - name: Build and start all services
        run: docker compose up --build -d --wait --wait-timeout 180

      - name: Verify API health endpoint
        run: |
          status=$(curl -sf http://localhost:3001/health | jq -r '.status')
          echo "API health: $status"
          [ "$status" = "ok" ] || [ "$status" = "degraded" ]

      - name: Verify web is serving
        run: curl -sfL http://localhost:3000/login > /dev/null

      - name: Verify API can write to uploads directory
        run: |
          docker exec community_api sh -c 'touch /app/apps/api/uploads/avatars/.write-test && rm /app/apps/api/uploads/avatars/.write-test'
          echo "Uploads directory is writable"

      - name: Run database migration check
        run: docker exec community_api npx prisma migrate deploy

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --tail 100

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ─── E2E Tests ──────────────────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: community_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d community_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/community_e2e
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-e2e-jwt-secret-at-least-32-chars-long
      JWT_REFRESH_SECRET: ci-e2e-refresh-secret-at-least-32-chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NEXT_PUBLIC_API_URL: http://localhost:3001
      SEED_DEMO_DATA: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client & migrate
        working-directory: apps/api
        run: |
          pnpm prisma generate
          pnpm prisma migrate deploy
          pnpm prisma db seed

      - name: Build API
        working-directory: apps/api
        run: pnpm run build

      - name: Start API
        working-directory: apps/api
        run: pnpm start:prod &
        env:
          PORT: 3001

      - name: Build and start web
        working-directory: apps/web
        run: |
          pnpm build
          pnpm start &

      - name: Wait for services
        run: |
          npx wait-on http://localhost:3001/health http://localhost:3000 --timeout 60000

      - name: Run E2E tests
        working-directory: apps/web
        run: pnpm test:e2e

      - name: Upload E2E report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
