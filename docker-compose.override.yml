services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  api:
    build:
      target: development
    environment:
      NODE_ENV: development
    volumes:
      - ./apps/api/src:/app/src
      - ./apps/api/prisma:/app/prisma
    command: pnpm run start:dev

  web:
    build:
      target: development
    environment:
      NODE_ENV: development
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
