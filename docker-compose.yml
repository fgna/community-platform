services:
  postgres:
    image: postgres:16-alpine
    container_name: community_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-community_platform}
    # Ports not exposed to host in production — only accessible via internal network
    expose:
      - "5432"
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: community_redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: community_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-community_platform}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: production
      API_PORT: 3001
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 100
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID:-}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${DATA_DIR:-./data}/uploads:/app/apps/api/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_LINKEDIN_CLIENT_ID: ${NEXT_PUBLIC_LINKEDIN_CLIENT_ID:-}
    container_name: community_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/login',(r)=>{process.exit(r.statusCode<400?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    image: nginx:1-alpine
    container_name: community_nginx
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/${NGINX_CONF_TEMPLATE:-default.conf.template}:/etc/nginx/templates/default.conf.template:ro
      - ${DATA_DIR:-./data}/certbot/conf:/etc/nginx/ssl:ro
      - ${DATA_DIR:-./data}/certbot/www:/var/www/certbot:ro
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:80/.well-known/acme-challenge/ || wget -qO /dev/null http://localhost:80/ || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3

  certbot:
    image: certbot/certbot:latest
    container_name: community_certbot
    profiles: ["proxy"]
    volumes:
      - ${DATA_DIR:-./data}/certbot/conf:/etc/letsencrypt
      - ${DATA_DIR:-./data}/certbot/www:/var/www/certbot

  backup:
    image: postgres:16-alpine
    container_name: community_backup
    profiles: ["backup"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-postgres}
      PGDATABASE: ${POSTGRES_DB:-community_platform}
      _PGPASS: ${POSTGRES_PASSWORD:-password}
    volumes:
      - ${DATA_DIR:-./data}/backups:/backups
    entrypoint: >
      sh -c 'printf "%s:%s:%s:%s:%s" "$$PGHOST" "5432" "$$PGDATABASE" "$$PGUSER" "$$_PGPASS" > ~/.pgpass
      && chmod 600 ~/.pgpass && unset _PGPASS
      && pg_dump -Fc > /backups/community_$$(date +%Y%m%d_%H%M%S).dump
      && echo "Backup complete" && rm -f ~/.pgpass
      && ls -lh /backups/'
